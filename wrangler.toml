name = "ground-zero"
compatibility_date = "2024-11-01"
pages_build_output_dir = "public"

# The site is fully static + Pages Functions that bundle the dataset, so no
# database binding is required to run or deploy. The D1 path is optional: the
# "ground-zero" database below already exists and is seeded (npm run
# d1:seed:remote). Uncomment the binding and adapt the /api/* functions to read
# DB if you ever want the API backed by D1 instead of the bundled snapshot.
#
# [[d1_databases]]
# binding = "DB"
# database_name = "ground-zero"
# database_id = "4b8c736b-9114-453b-95e7-46730e1bb399"
